<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palworld Base Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="bg-gray-800 rounded-xl p-6 shadow-lg mb-6 border border-gray-700">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">Palworld Base Tracker</h1>
            <div id="api-status" class="text-xs font-semibold text-gray-400">Loading DB...</div>
        </div>
        <div class="flex flex-col lg:flex-row gap-6">
            <div class="w-full lg:w-1/3">
                <div id="summary-container" class="bg-gray-800 rounded-xl p-6 border border-gray-700">
                    <h2 class="text-xl font-semibold mb-4 border-b border-gray-600 pb-2">Base Suitability Tally</h2>
                    <div id="tally-list" class="space-y-2"></div>
                </div>
            </div>
            <div class="w-full lg:w-2/3">
                <div id="active-pals-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        const SUITABILITIES = [
            { id: 'kindling', name: 'Kindling', icon: '🔥' },
            { id: 'watering', name: 'Watering', icon: '💧' },
            { id: 'planting', name: 'Planting', icon: '🌱' },
            { id: 'electricity', name: 'Electricity', icon: '⚡' },
            { id: 'handiwork', name: 'Handiwork', icon: '🛠️' },
            { id: 'gathering', name: 'Gathering', icon: '🌿' },
            { id: 'lumbering', name: 'Lumbering', icon: '🪵' },
            { id: 'mining', name: 'Mining', icon: '⛏️' },
            { id: 'medicine', name: 'Medicine', icon: '💊' },
            { id: 'cooling', name: 'Cooling', icon: '❄️' },
            { id: 'transporting', name: 'Transporting', icon: '📦' },
            { id: 'farming', name: 'Farming', icon: '🚧' }
        ];

        let PAL_DATABASE = [];
        let state = { workers: [{ id: Date.now(), name: "", traits: {} }] };

        async function fetchPalData() {
            try {
                const res = await fetch('pals_database.json');
                PAL_DATABASE = await res.json();
                document.getElementById('api-status').innerText = "Database Loaded Successfully";
            } catch(e) {
                console.warn("Could not load JSON, using defaults.");
                document.getElementById('api-status').innerText = "Using Internal Defaults";
            }
            renderWorkers();
            updateSummary();
        }

        function updateSummary() {
            const container = document.getElementById('tally-list');
            container.innerHTML = '';
            const totals = {};
            SUITABILITIES.forEach(s => totals[s.id] = 0);
            state.workers.forEach(w => {
                Object.entries(w.traits).forEach(([id, val]) => { totals[id] = (totals[id] || 0) + val; });
            });
            SUITABILITIES.forEach(s => {
                const div = document.createElement('div');
                div.className = "flex justify-between p-2 bg-gray-900 rounded border border-gray-700";
                div.innerHTML = `<span>${s.icon} ${s.name}</span><span class="font-bold">${totals[s.id]}</span>`;
                container.appendChild(div);
            });
        }

        function renderWorkers() {
            const container = document.getElementById('active-pals-container');
            container.innerHTML = '';
            state.workers.forEach((worker, i) => {
                const card = document.createElement('div');
                card.className = "bg-gray-800 p-4 rounded-xl border border-gray-700 relative";
                card.innerHTML = `
                    <input type="text" placeholder="Search Pal..." class="w-full bg-gray-900 border border-gray-600 rounded p-2 mb-2 text-sm" value="${worker.name}">
                    <div class="autocomplete-results hidden absolute z-10 bg-gray-700 w-full left-0 mt-1 rounded border border-gray-600"></div>
                    <div class="grid grid-cols-4 gap-2"></div>
                `;
                
                const input = card.querySelector('input');
                const results = card.querySelector('.autocomplete-results');
                input.addEventListener('input', (e) => {
                    const val = e.target.value.toLowerCase();
                    results.innerHTML = '';
                    if(!val) return results.classList.add('hidden');
                    const matches = PAL_DATABASE.filter(p => p.name.toLowerCase().includes(val));
                    if(matches.length > 0) {
                        results.classList.remove('hidden');
                        matches.forEach(p => {
                            const div = document.createElement('div');
                            div.className = "p-2 hover:bg-gray-600 cursor-pointer text-sm";
                            div.textContent = p.name;
                            div.onclick = () => {
                                worker.name = p.name;
                                worker.traits = {...p.traits};
                                input.value = p.name;
                                results.classList.add('hidden');
                                renderWorkers();
                                updateSummary();
                            };
                            results.appendChild(div);
                        });
                    }
                });

                const grid = card.querySelector('.grid');
                SUITABILITIES.forEach(s => {
                    const btn = document.createElement('button');
                    btn.className = "p-1 bg-gray-900 rounded text-center text-xs border border-gray-600";
                    btn.innerHTML = `${s.icon}<br>${worker.traits[s.id] || 0}`;
                    btn.onclick = () => {
                        worker.traits[s.id] = (worker.traits[s.id] || 0) + 1;
                        if(worker.traits[s.id] > 10) worker.traits[s.id] = 0;
                        renderWorkers();
                        updateSummary();
                    };
                    grid.appendChild(btn);
                });
                container.appendChild(card);
            });
        }

        window.onload = fetchPalData;
    </script>
</body>
</html>
