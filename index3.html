<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palworld Base Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b0f19; color: #e5e7eb; }
        .glass { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .no-select { user-select: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="glass rounded-2xl p-6 mb-8 flex flex-col md:flex-row items-center justify-between shadow-2xl">
            <div>
                <h1 class="text-4xl font-bold bg-gradient-to-r from-emerald-400 to-blue-500 bg-clip-text text-transparent">Palworld Base Tracker</h1>
                <p class="text-gray-400 mt-1">Optimization Dashboard</p>
            </div>
            <div class="flex items-center gap-6 mt-4 md:mt-0 bg-gray-900/50 px-6 py-3 rounded-xl border border-gray-700">
                <div class="flex flex-col items-center">
                    <span class="text-[10px] uppercase font-bold text-gray-500">Base Level</span>
                    <div class="flex items-center gap-4 mt-1">
                        <button onclick="changeBaseLevel(-1)" class="w-8 h-8 rounded-full bg-gray-700 hover:bg-gray-600 transition"><i class="fas fa-minus text-xs"></i></button>
                        <span id="base-level-display" class="text-2xl font-bold w-8 text-center">1</span>
                        <button onclick="changeBaseLevel(1)" class="w-8 h-8 rounded-full bg-gray-700 hover:bg-gray-600 transition"><i class="fas fa-plus text-xs"></i></button>
                    </div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <aside class="lg:col-span-1 space-y-4">
                <div class="glass rounded-2xl p-6 sticky top-8">
                    <h2 class="text-lg font-semibold mb-6 flex items-center gap-2"><i class="fas fa-chart-pie text-emerald-400"></i> Total Suitability</h2>
                    <div id="tally-list" class="space-y-3"></div>
                </div>
            </aside>

            <main class="lg:col-span-3">
                <div id="active-pals-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </main>
        </div>
    </div>

    <script>
        const SUITABILITIES = [
            { id: 'kindling', name: 'Kindling', icon: '🔥' },
            { id: 'watering', name: 'Watering', icon: '💧' },
            { id: 'planting', name: 'Planting', icon: '🌱' },
            { id: 'electricity', name: 'Electricity', icon: '⚡' },
            { id: 'handiwork', name: 'Handiwork', icon: '🛠️' },
            { id: 'gathering', name: 'Gathering', icon: '🌿' },
            { id: 'lumbering', name: 'Lumbering', icon: '🪵' },
            { id: 'mining', name: 'Mining', icon: '⛏️' },
            { id: 'medicine', name: 'Medicine', icon: '💊' },
            { id: 'cooling', name: 'Cooling', icon: '❄️' },
            { id: 'transporting', name: 'Transporting', icon: '📦' },
            { id: 'farming', name: 'Farming', icon: '🚧' }
        ];

        let PAL_DATABASE = [];
        let state = { baseLevel: 1, workers: [{ id: Date.now(), name: "", traits: {} }] };

        function getLevelColor(level) {
            if (level === 0) return 'text-gray-500 border-gray-700 bg-gray-900';
            if (level <= 2) return 'text-red-400 border-red-900/50 bg-red-900/20';
            if (level <= 5) return 'text-orange-400 border-orange-900/50 bg-orange-900/20';
            if (level < 10) return 'text-yellow-400 border-yellow-700/50 bg-yellow-900/20';
            return 'text-emerald-400 border-emerald-700/50 bg-emerald-900/20';
        }

        async function fetchPalData() {
            try {
                const res = await fetch('pals_database.json');
                PAL_DATABASE = await res.json();
            } catch(e) {
                PAL_DATABASE = [{ name: "Anubis", traits: { handiwork: 4, mining: 3 } }];
            }
            renderAll();
        }

        function changeBaseLevel(val) {
            state.baseLevel = Math.max(1, state.baseLevel + val);
            if (val > 0) state.workers.push({ id: Date.now(), name: "", traits: {} });
            else if (state.workers.length > 1) state.workers.pop();
            document.getElementById('base-level-display').innerText = state.baseLevel;
            renderAll();
        }

        function renderAll() {
            renderSummary();
            renderWorkers();
        }

        function renderSummary() {
            const container = document.getElementById('tally-list');
            container.innerHTML = '';
            const totals = {};
            state.workers.forEach(w => {
                for(let trait in w.traits) totals[trait] = (totals[trait] || 0) + w.traits[trait];
            });

            SUITABILITIES.forEach(suit => {
                const count = totals[suit.id] || 0;
                const div = document.createElement('div');
                div.className = `flex items-center justify-between p-3 rounded-lg border ${getLevelColor(count)}`;
                div.innerHTML = `
                    <span class="flex items-center gap-3 font-medium text-sm"><span class="text-lg">${suit.icon}</span> ${suit.name}</span>
                    <span class="font-bold text-lg">${count}</span>
                `;
                container.appendChild(div);
            });
        }

        function renderWorkers() {
            const container = document.getElementById('active-pals-container');
            container.innerHTML = '';
            state.workers.forEach((worker, idx) => {
                const card = document.createElement('div');
                card.className = "glass p-5 rounded-2xl relative overflow-hidden";
                card.innerHTML = `
                    <div class="absolute -right-2 -top-2 text-7xl font-black text-white/5 select-none z-0">#${idx + 1}</div>
                    <div class="relative z-10">
                        <div class="relative">
                            <input type="text" placeholder="Search Pal..." class="w-full bg-black/30 border border-gray-700 rounded-lg p-3 text-sm focus:outline-none focus:border-emerald-500" value="${worker.name}">
                            <div class="autocomplete-results hidden absolute top-full left-0 w-full z-50 bg-gray-900 border border-gray-700 rounded-lg shadow-xl max-h-40 overflow-y-auto"></div>
                        </div>
                        <div class="grid grid-cols-4 gap-2 mt-4"></div>
                    </div>
                `;
                
                const input = card.querySelector('input');
                const results = card.querySelector('.autocomplete-results');

                input.oninput = (e) => {
                    const val = e.target.value.toLowerCase();
                    results.innerHTML = '';
                    if(!val) return results.classList.add('hidden');
                    const matches = PAL_DATABASE.filter(p => p.name.toLowerCase().includes(val));
                    results.classList.toggle('hidden', matches.length === 0);
                    matches.forEach(p => {
                        const div = document.createElement('div');
                        div.className = "p-2 hover:bg-emerald-900/50 cursor-pointer text-sm border-b border-gray-800 last:border-none";
                        div.textContent = p.name;
                        div.onclick = () => {
                            worker.name = p.name;
                            worker.traits = {...p.traits};
                            results.classList.add('hidden');
                            renderAll();
                        };
                        results.appendChild(div);
                    });
                };

                const grid = card.querySelector('.grid');
                SUITABILITIES.forEach(s => {
                    if (worker.traits[s.id] > 0) {
                        const btn = document.createElement('button');
                        btn.className = `p-2 rounded-lg text-center text-xs border ${getLevelColor(worker.traits[s.id])}`;
                        btn.innerHTML = `${s.icon}<br><span class="font-bold">${worker.traits[s.id]}</span>`;
                        btn.onclick = () => {
                            worker.traits[s.id] = (worker.traits[s.id] % 10) + 1;
                            renderAll();
                        };
                        grid.appendChild(btn);
                    }
                });
                container.appendChild(card);
            });
        }

        window.onload = fetchPalData;
    </script>
</body>
</html>
