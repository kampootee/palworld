<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palworld Base Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        .no-select { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="bg-gray-800 rounded-xl p-6 shadow-lg mb-6 border border-gray-700 flex flex-col md:flex-row items-center justify-between gap-6">
            <div>
                <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">Palworld Base Tracker</h1>
                <div id="api-status" class="inline-flex items-center gap-2 px-2 py-1 rounded text-xs font-semibold bg-gray-700 text-gray-300">Loading...</div>
            </div>
            <div class="flex flex-wrap items-center justify-center gap-4 bg-gray-900/50 p-4 rounded-lg border border-gray-700">
                <div class="flex items-center gap-4">
                    <span class="text-gray-400 font-semibold uppercase tracking-wider text-sm">Base Level</span>
                    <div class="flex items-center bg-gray-800 rounded-lg border border-gray-600 overflow-hidden">
                        <button id="btn-level-down" class="px-4 py-2 hover:bg-gray-700 border-r border-gray-600 text-gray-300"><i class="fa-solid fa-minus"></i></button>
                        <span id="base-level-display" class="px-6 py-2 font-bold text-xl min-w-[3rem] text-center">1</span>
                        <button id="btn-level-up" class="px-4 py-2 hover:bg-gray-700 border-l border-gray-600 text-gray-300"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-6 items-start">
            <div class="w-full lg:w-1/3 flex-shrink-0">
                <div class="bg-gray-800 rounded-xl p-6 shadow-lg border border-gray-700 sticky top-4">
                    <h2 class="text-xl font-semibold mb-4 border-b border-gray-600 pb-2">Base Suitability Tally</h2>
                    <div id="summary-container" class="flex flex-col gap-2"></div>
                </div>
            </div>
            <div class="w-full lg:w-2/3">
                <div id="active-pals-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        const SUITABILITIES = [
            { id: 'kindling', name: 'Kindling', icon: '🔥', color: 'text-orange-500', bg: 'bg-orange-900/30 border-orange-700/50' },
            { id: 'watering', name: 'Watering', icon: '💧', color: 'text-blue-500', bg: 'bg-blue-900/30 border-blue-700/50' },
            { id: 'planting', name: 'Planting', icon: '🌱', color: 'text-green-500', bg: 'bg-green-900/30 border-green-700/50' },
            { id: 'electricity', name: 'Generating Electricity', icon: '⚡', color: 'text-yellow-400', bg: 'bg-yellow-900/30 border-yellow-700/50' },
            { id: 'handiwork', name: 'Handiwork', icon: '🛠️', color: 'text-stone-400', bg: 'bg-stone-800/50 border-stone-600/50' },
            { id: 'gathering', name: 'Gathering', icon: '🌿', color: 'text-emerald-400', bg: 'bg-emerald-900/30 border-emerald-700/50' },
            { id: 'lumbering', name: 'Lumbering', icon: '🪵', color: 'text-amber-600', bg: 'bg-amber-900/30 border-amber-700/50' },
            { id: 'mining', name: 'Mining', icon: '⛏️', color: 'text-slate-400', bg: 'bg-slate-800/50 border-slate-600/50' },
            { id: 'medicine', name: 'Medicine Production', icon: '💊', color: 'text-teal-400', bg: 'bg-teal-900/30 border-teal-700/50' },
            { id: 'cooling', name: 'Cooling', icon: '❄️', color: 'text-cyan-400', bg: 'bg-cyan-900/30 border-cyan-700/50' },
            { id: 'transporting', name: 'Transporting', icon: '📦', color: 'text-indigo-400', bg: 'bg-indigo-900/30 border-indigo-700/50' },
            { id: 'farming', name: 'Farming', icon: '🚧', color: 'text-lime-500', bg: 'bg-lime-900/30 border-lime-700/50' }
        ];

        let PAL_DATABASE = [];
        let state = { baseLevel: 1, workers: [{ id: Date.now(), traits: {}, name: "" }] };

        function updateSummary() {
            const container = document.getElementById('summary-container');
            container.innerHTML = '';
            const totals = {};
            SUITABILITIES.forEach(s => totals[s.id] = 0);

            state.workers.forEach(w => {
                Object.entries(w.traits).forEach(([id, val]) => {
                    if (totals.hasOwnProperty(id)) totals[id] += val;
                });
            });

            SUITABILITIES.forEach(suit => {
                const total = totals[suit.id];
                const div = document.createElement('div');
                div.className = `flex items-center justify-between p-3 rounded-lg border ${total > 0 ? suit.bg : 'bg-gray-800 border-gray-700'}`;
                div.innerHTML = `<div class="flex items-center gap-3"><span class="text-xl">${suit.icon}</span><span class="text-sm font-semibold">${suit.name}</span></div><span class="font-bold text-lg">${total}</span>`;
                container.appendChild(div);
            });
        }

        function renderWorkers() {
            const container = document.getElementById('active-pals-container');
            container.innerHTML = '';
            state.workers.forEach((worker, index) => {
                const card = document.createElement('div');
                card.className = "bg-gray-800 p-4 rounded-xl border border-gray-700";
                
                const header = document.createElement('div');
                header.className = "mb-3 relative";
                header.innerHTML = `<input type="text" placeholder="Search Pal..." class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-sm search-input">`;
                
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-4 gap-2";
                SUITABILITIES.forEach(s => {
                    const btn = document.createElement('button');
                    const val = worker.traits[s.id] || 0;
                    btn.className = `p-2 rounded border text-center ${val > 0 ? 'bg-gray-700 border-blue-500' : 'bg-gray-900 border-gray-700'}`;
                    btn.innerHTML = `<div>${s.icon}</div><div class="text-xs">${val}</div>`;
                    btn.onclick = () => { 
                        worker.traits[s.id] = (worker.traits[s.id] || 0) + 1;
                        if(worker.traits[s.id] > 10) worker.traits[s.id] = 0;
                        renderWorkers(); updateSummary(); 
                    };
                    grid.appendChild(btn);
                });
                card.appendChild(header);
                card.appendChild(grid);
                container.appendChild(card);
            });
        }

        window.onload = async () => {
            try {
                const res = await fetch('pals_database.json');
                PAL_DATABASE = await res.json();
                document.getElementById('api-status').innerText = "DB Loaded";
            } catch(e) { document.getElementById('api-status').innerText = "Using Local Cache"; }
            
            document.getElementById('btn-level-up').onclick = () => {
                state.workers.push({ id: Date.now(), traits: {}, name: "" });
                renderWorkers();
            };
            
            renderWorkers();
            updateSummary();
        };
    </script>
</body>
</html>
