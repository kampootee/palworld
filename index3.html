<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palworld Base Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: #e5e7eb; }
        .dropdown-results { max-height: 300px; overflow-y: auto; z-index: 1000; }
        .no-select { user-select: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="bg-gray-900 rounded-2xl p-6 mb-8 border border-gray-800 shadow-2xl flex flex-col md:flex-row items-center justify-between gap-6">
            <div>
                <h1 class="text-3xl font-bold text-white">Palworld Base Tracker</h1>
                <p class="text-gray-400 mt-1 text-sm">Manage workers and track suitability.</p>
                <div id="status-msg" class="text-[10px] mt-2 font-bold text-amber-500 uppercase">Loading Database...</div>
            </div>
            <div class="flex items-center gap-6 bg-gray-950 px-6 py-3 rounded-xl border border-gray-800">
                <div class="flex flex-col items-center">
                    <span class="text-[10px] uppercase font-bold text-gray-500">Base Level</span>
                    <div class="flex items-center gap-4 mt-1">
                        <button id="level-down" class="w-8 h-8 rounded-full bg-gray-800 hover:bg-gray-700 transition"><i class="fas fa-minus text-xs"></i></button>
                        <span id="base-level-display" class="text-2xl font-bold w-8 text-center">1</span>
                        <button id="level-up" class="w-8 h-8 rounded-full bg-gray-800 hover:bg-gray-700 transition"><i class="fas fa-plus text-xs"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <aside class="lg:col-span-1">
                <div class="bg-gray-900 rounded-2xl p-6 border border-gray-800 sticky top-8">
                    <h2 class="text-lg font-semibold mb-6 flex items-center gap-2 text-white"><i class="fas fa-chart-pie text-emerald-500"></i> Suitability Tally</h2>
                    <div id="tally-list" class="space-y-3"></div>
                </div>
            </aside>
            <main class="lg:col-span-3">
                <div id="active-pals-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </main>
        </div>
    </div>

    <script>
        let PAL_DATABASE = [];
        const SUITABILITIES = [
            { id: 'kindling', name: 'Kindling', icon: '🔥' },
            { id: 'watering', name: 'Watering', icon: '💧' },
            { id: 'planting', name: 'Planting', icon: '🌱' },
            { id: 'electricity', name: 'Electricity', icon: '⚡' },
            { id: 'handiwork', name: 'Handiwork', icon: '🛠️' },
            { id: 'gathering', name: 'Gathering', icon: '🌿' },
            { id: 'lumbering', name: 'Lumbering', icon: '🪵' },
            { id: 'mining', name: 'Mining', icon: '⛏️' },
            { id: 'medicine', name: 'Medicine', icon: '💊' },
            { id: 'cooling', name: 'Cooling', icon: '❄️' },
            { id: 'transporting', name: 'Transporting', icon: '📦' },
            { id: 'farming', name: 'Farming', icon: '🚧' }
        ];

        let state = JSON.parse(localStorage.getItem('palTrackerState')) || { baseLevel: 1, workers: [{ name: "", traits: {} }] };

        function getLevelColor(level) {
            if (level <= 0) return '#4b5563';
            if (level >= 10) return '#10b981';
            const intensity = level / 10;
            const r = Math.floor(239 - (intensity * 200));
            const g = Math.floor(68 + (intensity * 150));
            return `rgb(${r}, ${g}, 100)`;
        }

        async function fetchDatabase() {
            try {
                const response = await fetch('pals_database.json');
                if(!response.ok) throw new Error();
                PAL_DATABASE = await response.json();
                document.getElementById('status-msg').textContent = "Database Loaded Successfully";
                document.getElementById('status-msg').className = "text-[10px] mt-2 font-bold text-emerald-500 uppercase";
            } catch(e) {
                console.error("Fetch failed", e);
                document.getElementById('status-msg').textContent = "Database Load Failed (Check file/server)";
            }
        }

        function saveState() { localStorage.setItem('palTrackerState', JSON.stringify(state)); renderAll(); }

        function renderAll() {
            document.getElementById('base-level-display').innerText = state.baseLevel;
            renderSummary();
            renderWorkers();
        }

        function renderSummary() {
            const container = document.getElementById('tally-list');
            container.innerHTML = '';
            const totals = {};
            const counts = {};
            SUITABILITIES.forEach(s => { totals[s.id] = 0; counts[s.id] = 0; });

            state.workers.forEach(w => {
                for(let trait in w.traits) {
                    totals[trait] += w.traits[trait];
                    counts[trait]++;
                }
            });

            SUITABILITIES.forEach(suit => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-3 rounded-lg border border-gray-800 bg-gray-950";
                div.innerHTML = `
                    <span class="flex items-center gap-3 font-medium text-sm text-gray-300"><span class="text-lg">${suit.icon}</span> ${suit.name}</span>
                    <div class="flex flex-col items-end">
                        <span class="text-[9px] uppercase font-bold text-gray-600">Pals: ${counts[suit.id]}</span>
                        <span class="font-bold text-lg" style="color: ${getLevelColor(totals[suit.id])}">${totals[suit.id]}</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderWorkers() {
            const container = document.getElementById('active-pals-container');
            container.innerHTML = '';
            state.workers.forEach((worker, idx) => {
                const card = document.createElement('div');
                card.className = "bg-gray-900 border border-gray-800 p-5 rounded-2xl relative overflow-visible";
                card.innerHTML = `
                    <div class="absolute -right-2 -top-2 text-7xl font-black text-white/5 select-none pointer-events-none">#${idx + 1}</div>
                    <div class="relative z-20">
                        <div class="flex items-center gap-2 mb-4">
                            <div class="relative flex-1">
                                <input type="text" placeholder="Search Pal..." class="w-full bg-gray-950 border border-gray-800 rounded-lg p-3 text-sm focus:outline-none focus:border-emerald-500 text-white" value="${worker.name || ''}">
                                <div class="dropdown-results hidden absolute top-full left-0 w-full bg-gray-800 border border-gray-700 rounded-lg shadow-2xl mt-1"></div>
                            </div>
                            <button class="delete-btn text-gray-500 hover:text-red-400 p-2"><i class="fas fa-trash"></i></button>
                        </div>
                        <div class="grid grid-cols-4 gap-2"></div>
                    </div>
                `;
                
                const input = card.querySelector('input');
                const results = card.querySelector('.dropdown-results');
                
                input.oninput = (e) => {
                    const val = e.target.value.toLowerCase();
                    results.innerHTML = '';
                    if(!val) { results.classList.add('hidden'); return; }
                    const matches = PAL_DATABASE.filter(p => p.name.toLowerCase().includes(val));
                    results.classList.toggle('hidden', matches.length === 0);
                    matches.forEach(p => {
                        const div = document.createElement('div');
                        div.className = "p-3 hover:bg-emerald-900/50 cursor-pointer text-sm border-b border-gray-800 text-white";
                        div.textContent = p.name;
                        div.onclick = () => { worker.name = p.name; worker.traits = {...p.traits}; results.classList.add('hidden'); saveState(); };
                        results.appendChild(div);
                    });
                };

                card.querySelector('.delete-btn').onclick = () => { worker.name = ""; worker.traits = {}; saveState(); };

                const grid = card.querySelector('.grid');
                SUITABILITIES.forEach(s => {
                    if (worker.traits[s.id] !== undefined) {
                        const btn = document.createElement('button');
                        const color = getLevelColor(worker.traits[s.id]);
                        btn.className = "p-2 rounded-lg text-center text-xs border bg-gray-950 transition-all hover:scale-105";
                        btn.style.borderColor = color;
                        btn.innerHTML = `${s.icon}<br><span class="font-bold" style="color:${color}">${worker.traits[s.id]}</span>`;
                        btn.onclick = () => { worker.traits[s.id] = (worker.traits[s.id] % 10) + 1; saveState(); };
                        grid.appendChild(btn);
                    }
                });
                container.appendChild(card);
            });
        }

        document.getElementById('level-up').onclick = () => { state.baseLevel++; state.workers.push({ name: "", traits: {} }); saveState(); };
        document.getElementById('level-down').onclick = () => { if (state.baseLevel > 1) { state.baseLevel--; state.workers.pop(); saveState(); } };
        
        fetchDatabase().then(renderAll);
    </script>
</body>
</html>
