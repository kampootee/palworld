<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palworld Base Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="bg-gray-800 rounded-xl p-6 shadow-lg mb-6 border border-gray-700 flex flex-col md:flex-row items-center justify-between gap-6">
            <div>
                <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Palworld Base Tracker</h1>
                <div id="api-status" class="text-xs font-semibold text-gray-400 mt-2">Initializing...</div>
            </div>
            <div class="flex items-center gap-4 bg-gray-900 p-3 rounded-lg border border-gray-700">
                <span class="text-sm font-semibold text-gray-400">Base Level:</span>
                <button onclick="changeBaseLevel(-1)" class="px-3 py-1 bg-gray-700 rounded hover:bg-gray-600">-</button>
                <span id="base-level-display" class="font-bold text-xl w-8 text-center">1</span>
                <button onclick="changeBaseLevel(1)" class="px-3 py-1 bg-gray-700 rounded hover:bg-gray-600">+</button>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-6">
            <div class="w-full lg:w-1/3">
                <div class="bg-gray-800 rounded-xl p-6 border border-gray-700">
                    <h2 class="text-xl font-semibold mb-4 border-b border-gray-600 pb-2">Active Traits</h2>
                    <div id="tally-list" class="space-y-2"></div>
                </div>
            </div>
            <div class="w-full lg:w-2/3">
                <div id="active-pals-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        const SUITABILITIES = [
            { id: 'kindling', name: 'Kindling', icon: '🔥' },
            { id: 'watering', name: 'Watering', icon: '💧' },
            { id: 'planting', name: 'Planting', icon: '🌱' },
            { id: 'electricity', name: 'Electricity', icon: '⚡' },
            { id: 'handiwork', name: 'Handiwork', icon: '🛠️' },
            { id: 'gathering', name: 'Gathering', icon: '🌿' },
            { id: 'lumbering', name: 'Lumbering', icon: '🪵' },
            { id: 'mining', name: 'Mining', icon: '⛏️' },
            { id: 'medicine', name: 'Medicine', icon: '💊' },
            { id: 'cooling', name: 'Cooling', icon: '❄️' },
            { id: 'transporting', name: 'Transporting', icon: '📦' },
            { id: 'farming', name: 'Farming', icon: '🚧' }
        ];

        let PAL_DATABASE = [];
        let state = { baseLevel: 1, workers: [{ id: Date.now(), name: "", traits: {} }] };

        async function fetchPalData() {
            try {
                const res = await fetch('pals_database.json');
                PAL_DATABASE = await res.json();
                document.getElementById('api-status').innerText = "Database Loaded Successfully";
            } catch(e) {
                document.getElementById('api-status').innerText = "Using Internal Defaults (JSON file not found)";
                PAL_DATABASE = [{ name: "ExamplePal", traits: { handiwork: 1, mining: 2 } }];
            }
            renderWorkers();
            updateSummary();
        }

        function changeBaseLevel(val) {
            state.baseLevel = Math.max(1, state.baseLevel + val);
            if (val > 0) state.workers.push({ id: Date.now(), name: "", traits: {} });
            else if (state.workers.length > 1) state.workers.pop();
            document.getElementById('base-level-display').innerText = state.baseLevel;
            renderWorkers();
            updateSummary();
        }

        function updateSummary() {
            const container = document.getElementById('tally-list');
            container.innerHTML = '';
            const totals = {};
            
            state.workers.forEach(w => {
                for(let trait in w.traits) {
                    totals[trait] = (totals[trait] || 0) + w.traits[trait];
                }
            });

            SUITABILITIES.forEach(suit => {
                if (totals[suit.id] > 0) {
                    const item = document.createElement('div');
                    item.className = "flex items-center justify-between p-3 bg-gray-900 rounded-lg border border-gray-700";
                    item.innerHTML = `
                        <span class="flex items-center gap-2"><span class="text-xl">${suit.icon}</span> ${suit.name}</span>
                        <span class="font-bold text-lg">${totals[suit.id]}</span>
                    `;
                    container.appendChild(item);
                }
            });
        }

        function renderWorkers() {
            const container = document.getElementById('active-pals-container');
            container.innerHTML = '';
            state.workers.forEach((worker) => {
                const card = document.createElement('div');
                card.className = "bg-gray-800 p-4 rounded-xl border border-gray-700 relative";
                card.innerHTML = `
                    <input type="text" placeholder="Search Pal..." class="search-input w-full bg-gray-900 border border-gray-600 rounded p-2 mb-2 text-sm text-white" value="${worker.name}">
                    <div class="autocomplete-results hidden absolute z-10 bg-gray-700 w-[90%] left-4 mt-1 rounded border border-gray-600 max-h-40 overflow-y-auto"></div>
                    <div class="grid grid-cols-4 gap-2"></div>
                `;
                
                const input = card.querySelector('input');
                const results = card.querySelector('.autocomplete-results');
                input.addEventListener('input', (e) => {
                    const val = e.target.value.toLowerCase();
                    results.innerHTML = '';
                    if(!val) return results.classList.add('hidden');
                    const matches = PAL_DATABASE.filter(p => p.name.toLowerCase().includes(val));
                    if(matches.length > 0) {
                        results.classList.remove('hidden');
                        matches.forEach(p => {
                            const div = document.createElement('div');
                            div.className = "p-2 hover:bg-gray-600 cursor-pointer text-sm text-white";
                            div.textContent = p.name;
                            div.onclick = () => {
                                worker.name = p.name;
                                worker.traits = {...p.traits};
                                input.value = p.name;
                                results.classList.add('hidden');
                                renderWorkers();
                                updateSummary();
                            };
                            results.appendChild(div);
                        });
                    } else results.classList.add('hidden');
                });

                const grid = card.querySelector('.grid');
                SUITABILITIES.forEach(s => {
                    const btn = document.createElement('button');
                    btn.className = "p-1 bg-gray-900 rounded text-center text-xs border border-gray-600 text-white";
                    btn.innerHTML = `${s.icon}<br>${worker.traits[s.id] || 0}`;
                    btn.onclick = () => {
                        worker.traits[s.id] = (worker.traits[s.id] || 0) + 1;
                        if(worker.traits[s.id] > 20) worker.traits[s.id] = 0;
                        renderWorkers();
                        updateSummary();
                    };
                    grid.appendChild(btn);
                });
                container.appendChild(card);
            });
        }

        window.onload = fetchPalData;
    </script>
</body>
</html>
