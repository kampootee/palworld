<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palworld Base Tracker - Light Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #1f2937; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Palworld Base Tracker</h1>
                <div id="api-status" class="inline-flex items-center gap-2 px-3 py-1 rounded text-xs font-semibold bg-gray-100 text-gray-600 border border-gray-200">
                    <i class="fa-solid fa-spinner fa-spin"></i> Loading DB...
                </div>
            </div>
            <div class="flex items-center gap-6 mt-4 md:mt-0 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <div class="text-center">
                    <span class="block text-xs text-gray-500 font-bold mb-1 uppercase tracking-wide">Base Level</span>
                    <div class="flex items-center justify-center gap-3">
                        <button id="btn-lvl-down" class="w-8 h-8 rounded-full bg-white hover:bg-gray-100 border border-gray-300"><i class="fa-solid fa-minus text-sm"></i></button>
                        <span id="base-level-display" class="text-2xl font-bold w-10">1</span>
                        <button id="btn-lvl-up" class="w-8 h-8 rounded-full bg-blue-600 hover:bg-blue-700 text-white"><i class="fa-solid fa-plus text-sm"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Summary -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-200">
                    <h2 class="text-lg font-bold mb-4 text-gray-800 border-b pb-2">Suitability Count</h2>
                    <div id="summary-container" class="flex flex-col gap-2"></div>
                </div>
            </div>
            <!-- Workforce -->
            <div class="lg:col-span-3">
                <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-200">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-lg font-bold text-gray-800">Pal Workforce</h2>
                        <button id="clear-all-btn" class="text-sm px-3 py-1.5 bg-red-50 text-red-600 hover:bg-red-100 rounded border border-red-200">Clear All</button>
                    </div>
                    <div id="workers-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUITABILITIES = [
            { id: 'kindling', name: 'Kindling', icon: '🔥' },
            { id: 'watering', name: 'Watering', icon: '💧' },
            { id: 'planting', name: 'Planting', icon: '🌱' },
            { id: 'electricity', name: 'Electricity', icon: '⚡' },
            { id: 'handiwork', name: 'Handiwork', icon: '🛠️' },
            { id: 'gathering', name: 'Gathering', icon: '🌿' },
            { id: 'lumbering', name: 'Lumbering', icon: '🪵' },
            { id: 'mining', name: 'Mining', icon: '⛏️' },
            { id: 'medicine', name: 'Medicine', icon: '💊' },
            { id: 'cooling', name: 'Cooling', icon: '❄️' },
            { id: 'transporting', name: 'Transporting', icon: '📦' },
            { id: 'farming', name: 'Farming', icon: '🚧' }
        ];

        let PAL_DATABASE = [];
        let state = { baseLevel: 1, workers: [{ id: Date.now(), traits: {} }] };

        async function fetchPalData() {
            try {
                const response = await fetch('pals_database.json');
                const rawData = await response.json();
                PAL_DATABASE = rawData.map(pal => ({
                    name: pal.Name,
                    traits: parseTraits(pal["Work Suitability"])
                }));
                document.getElementById('api-status').innerHTML = `<i class="fa-solid fa-check text-emerald-500"></i> DB Loaded`;
            } catch (e) {
                document.getElementById('api-status').innerText = "DB Error";
            }
        }

        function parseTraits(str) {
            const traits = {};
            if (!str) return traits;
            str.split(',').forEach(p => {
                const parts = p.trim().split(' ');
                const val = parseInt(parts.pop());
                const key = parts.join(' ').toLowerCase();
                const traitMap = { "kindling": "kindling", "water": "watering", "plant": "planting", "electric": "electricity", "handiwork": "handiwork", "gather": "gathering", "lumber": "lumbering", "mine": "mining", "med": "medicine", "cool": "cooling", "transport": "transporting", "farm": "farming" };
                if (traitMap[key]) traits[traitMap[key]] = val;
            });
            return traits;
        }

        function updateSummary() {
            const container = document.getElementById('summary-container');
            container.innerHTML = '';
            const counts = {};
            state.workers.forEach(w => Object.keys(w.traits).forEach(k => counts[k] = (counts[k] || 0) + 1));
            
            SUITABILITIES.forEach(s => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-2 rounded bg-gray-50 border border-gray-100";
                div.innerHTML = `<span>${s.icon} ${s.name}</span> <span class="font-bold text-blue-600">${counts[s.id] || 0} Pals</span>`;
                container.appendChild(div);
            });
        }

        function renderWorkers() {
            const container = document.getElementById('workers-container');
            container.innerHTML = '';
            [...state.workers].reverse().forEach((w) => {
                const div = document.createElement('div');
                div.className = "p-4 border rounded-lg bg-white shadow-sm";
                div.innerHTML = `<input type="text" placeholder="Search Pal..." class="w-full border-b mb-2 focus:outline-none" oninput="handleSearch(${w.id}, this.value)">`;
                const traitDiv = document.createElement('div');
                traitDiv.className = "flex gap-2 flex-wrap";
                SUITABILITIES.forEach(s => {
                    const btn = document.createElement('button');
                    btn.className = "text-xs p-1 border rounded bg-gray-50 hover:bg-gray-100";
                    btn.textContent = `${s.icon} ${w.traits[s.id] || 0}`;
                    btn.onclick = () => { w.traits[s.id] = ((w.traits[s.id] || 0) + 1) % 11; fullRender(); };
                    btn.oncontextmenu = (e) => { e.preventDefault(); w.traits[s.id] = Math.max(0, (w.traits[s.id] || 0) - 1); fullRender(); };
                    traitDiv.appendChild(btn);
                });
                div.appendChild(traitDiv);
                container.appendChild(div);
            });
        }

        window.handleSearch = (id, val) => {
            const pal = PAL_DATABASE.find(p => p.name.toLowerCase() === val.toLowerCase());
            if (pal) {
                const worker = state.workers.find(w => w.id === id);
                worker.traits = { ...pal.traits };
                fullRender();
            }
        };

        function fullRender() {
            renderWorkers();
            updateSummary();
            localStorage.setItem('tracker', JSON.stringify(state));
        }

        document.getElementById('btn-lvl-up').onclick = () => { state.baseLevel++; state.workers.push({ id: Date.now(), traits: {} }); fullRender(); };
        document.getElementById('btn-lvl-down').onclick = () => { if(state.baseLevel > 1) { state.baseLevel--; state.workers.pop(); fullRender(); } };
        document.getElementById('clear-all-btn').onclick = () => { state.workers = [{ id: Date.now(), traits: {} }]; fullRender(); };

        window.onload = async () => {
            const saved = localStorage.getItem('tracker');
            if(saved) state = JSON.parse(saved);
            await fetchPalData();
            fullRender();
        };
    </script>
</body>
</html>
