<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palworld Base Tracker - Light Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #1f2937; }
        .suggestions { border: 1px solid #d1d5db; position: absolute; z-index: 50; width: calc(100% - 2rem); background: white; border-radius: 0.5rem; max-height: 200px; overflow-y: auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .suggestion-item { padding: 0.75rem; cursor: pointer; border-bottom: 1px solid #f3f4f6; }
        .suggestion-item:hover { background: #eff6ff; color: #1d4ed8; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
            <h1 class="text-3xl font-bold text-gray-900">Palworld Base Tracker</h1>
            <div class="flex items-center gap-4">
                <button id="btn-lvl-down" class="p-3 bg-gray-100 hover:bg-gray-200 rounded-xl transition"><i class="fa-solid fa-minus"></i></button>
                <span id="base-level-display" class="text-2xl font-bold w-12 text-center">1</span>
                <button id="btn-lvl-up" class="p-3 bg-blue-600 text-white hover:bg-blue-700 rounded-xl transition"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                    <h2 class="text-lg font-bold mb-4 text-gray-800">Team Summary</h2>
                    <div id="summary-container" class="flex flex-col gap-2"></div>
                </div>
            </div>
            <div class="lg:col-span-3">
                <div id="workers-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        // Internal Database
        const PAL_DATABASE = [
            { "Name": "Anubis", "Work Suitability": "Handiwork 4, Transporting 2, Mining 3" },
            { "Name": "Lamball", "Work Suitability": "Handiwork 1, Transporting 1, Farming 1" },
            { "Name": "Jormuntide", "Work Suitability": "Watering 4" }
        ];

        let state = { baseLevel: 1, workers: [{ id: Date.now(), traits: {} }] };
        const SUITABILITIES = ['Kindling', 'Watering', 'Planting', 'Electricity', 'Handiwork', 'Gathering', 'Lumbering', 'Mining', 'Medicine', 'Cooling', 'Transporting', 'Farming'];

        function init() {
            const saved = localStorage.getItem('paltracker');
            if(saved) state = JSON.parse(saved);
            render();
        }

        function render() {
            document.getElementById('base-level-display').innerText = state.baseLevel;
            updateSummary();
            renderWorkers();
            localStorage.setItem('paltracker', JSON.stringify(state));
        }

        function updateSummary() {
            const container = document.getElementById('summary-container');
            container.innerHTML = '';
            const counts = {};
            state.workers.forEach(w => Object.keys(w.traits).forEach(t => counts[t] = (counts[t] || 0) + 1));
            SUITABILITIES.forEach(s => {
                const div = document.createElement('div');
                div.className = "flex justify-between p-3 bg-gray-50 rounded-lg text-sm border border-gray-100";
                div.innerHTML = `<span class="font-medium text-gray-700">${s}</span> <span class="font-bold text-blue-600">${counts[s] || 0} Pals</span>`;
                container.appendChild(div);
            });
        }

        function renderWorkers() {
            const container = document.getElementById('workers-container');
            container.innerHTML = '';
            state.workers.forEach((w, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-2xl border border-gray-200 shadow-sm relative";
                div.innerHTML = `
                    <input type="text" placeholder="Search Pal Name..." class="w-full border-b-2 border-gray-100 mb-4 pb-1 focus:outline-none focus:border-blue-500 transition">
                    <div class="suggestions hidden"></div>
                    <div class="flex gap-2 flex-wrap text-xs text-gray-500 italic">
                        ${Object.keys(w.traits).map(k => `<span class="bg-blue-50 text-blue-700 px-2 py-1 rounded">${k} (${w.traits[k]})</span>`).join('')}
                    </div>
                `;
                
                const input = div.querySelector('input');
                const sugg = div.querySelector('.suggestions');
                input.oninput = (e) => {
                    const val = e.target.value.toLowerCase();
                    sugg.innerHTML = '';
                    if(!val) { sugg.classList.add('hidden'); return; }
                    const matches = PAL_DATABASE.filter(p => p.Name.toLowerCase().includes(val));
                    matches.forEach(m => {
                        const opt = document.createElement('div');
                        opt.className = "suggestion-item";
                        opt.innerText = m.Name;
                        opt.onclick = () => {
                            w.traits = parseTraits(m["Work Suitability"]);
                            render();
                        };
                        sugg.appendChild(opt);
                    });
                    sugg.classList.remove('hidden');
                };
                container.appendChild(div);
            });
        }

        function parseTraits(str) {
            const traits = {};
            str.split(',').forEach(p => {
                const parts = p.trim().split(' ');
                const level = parts.pop();
                const type = parts.join(' ');
                traits[type] = level;
            });
            return traits;
        }

        document.getElementById('btn-lvl-up').onclick = () => { state.baseLevel++; state.workers.push({ id: Date.now(), traits: {} }); render(); };
        document.getElementById('btn-lvl-down').onclick = () => { if(state.baseLevel > 1) { state.baseLevel--; state.workers.pop(); render(); } };
        init();
    </script>
</body>
</html>
